<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Success | Sydro Tech</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0b1020,#111827,#1a1f38);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    overflow:hidden;
}

.box{
    width:90%;
    max-width:520px;
    padding:45px;
    border-radius:24px;
    text-align:center;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
    animation:fadeUp 1s ease;
}

.icon{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#00c2ff,#7c3aed);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:42px;
    margin-bottom:20px;
}

h1{
    font-size:34px;
    margin-bottom:12px;
}

p{
    color:#cbd5e1;
    line-height:1.7;
    margin-bottom:12px;
}

.timer{
    color:#00c2ff;
    font-weight:bold;
}

a{
    display:inline-block;
    margin-top:18px;
    padding:14px 28px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    background:linear-gradient(90deg,#00c2ff,#7c3aed);
    transition:.3s;
}

a:hover{
    transform:translateY(-3px);
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="box">

<div class="icon">✓</div>

<h1>Thank You, {{ name }}!</h1>

<p>Your request has been received successfully.</p>

<p>Our team at <strong>Sydro Tech</strong> will contact you soon.</p>

<p>Redirecting to homepage in
<span class="timer" id="count">5</span> seconds...</p>

<a href="/">Go Back Now</a>

</div>


<script>
let time = 5;
const count = document.getElementById("count");

const timer = setInterval(function(){

    time--;
    count.textContent = time;

    if(time <= 0){
        clearInterval(timer);
        window.location.href = "/";
    }

},1000);
</script>

</body>
</html>
